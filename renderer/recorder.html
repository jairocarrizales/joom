<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob: mediastream:;" />
  <title>Vista previa</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; cursor: grab; }
    #canvas { width: 100vw; height: 100vh; object-fit: contain; display: block; pointer-events: none; }
    video { display: none; }
  </style>
</head>
<body>
  <!-- Vídeos de trabajo ocultos; el canvas se muestra como vista previa -->
  <video id="screen" autoplay muted playsinline></video>
  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
  <script src="recorder.js"></script>
</body>
</html>
